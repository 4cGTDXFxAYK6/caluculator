<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>履歴付き電卓 (省スペース版)</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">

<style>
  :root {
    --bg: #000;
    --panel-bg: #1c1c1e;
    --btn-dark: #2c2c2e;
    --btn-gray: #a5a5a5;
    --btn-accent: #ff9f0a; 
    --border: rgba(255, 255, 255, 0.1);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; touch-action: none; }
  body { display: flex; align-items: center; justify-content: center; }
  
  .calculator { width: 100%; max-width: 600px; padding: 12px; display: flex; flex-direction: column; height: 100%; }
  
  /* 履歴エリア */
  .history { 
    background: rgba(255, 255, 255, 0.05); 
    backdrop-filter: blur(20px); 
    color: #fff; 
    flex: 1; 
    border-radius: 16px; 
    overflow-y: auto; 
    overflow-x: hidden;
    font-size: 22px; 
    margin-bottom: 12px; 
    scrollbar-width: none; 
  }

  /* 履歴の各行：削除背景（オレンジ） */
  .history-item {
    position: relative;
    background-color: var(--btn-accent); 
    border-bottom: 1px solid rgba(0, 0, 0, 0.2);
    overflow: hidden;
  }
  
  /* 前面パネル：paddingを8pxに縮小（行間を狭く） */
  .history-content {
    background-color: #121212; 
    padding: 8px 16px; /* 12pxから8pxへ変更 */
    position: relative;
    z-index: 2;
    transition: transform 0.25s ease-out;
    display: flex;
    align-items: center;
    min-height: 44px; /* タップ精度のための最小高さ */
  }

  .text { 
    flex: 1; 
    white-space: nowrap; 
    overflow-x: auto; 
    scrollbar-width: none;
    letter-spacing: -0.04em;
  }

  .delete-label {
    position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
    display: flex; align-items: center; justify-content: center;
    color: #000; font-size: 16px; font-weight: bold; z-index: 1;
  }

  /* 合計ボックス（コピー機能付き） */
  .total-box { 
    background: rgba(255, 255, 255, 0.1); 
    color: #fff; 
    padding: 12px 16px; 
    border-radius: 14px; 
    font-size: 26px; 
    text-align: right; 
    margin-bottom: 10px; 
    font-weight: 600; 
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.2s;
  }
  .total-box:active { background: rgba(255, 255, 255, 0.2); }
  
  .copy-flash {
    position: absolute; inset: 0;
    background: var(--btn-accent);
    opacity: 0; pointer-events: none;
  }
  @keyframes flash-animation {
    0% { opacity: 0.5; }
    100% { opacity: 0; }
  }
  
  .keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  button { height: 75px; border: none; font-size: 26px; color: #fff; background: var(--btn-dark); cursor: pointer; outline: none; }
  button:active { filter: brightness(1.6); }
  .op, .equal { background: var(--btn-accent); color: #000; font-weight: 600; font-size: 30px; }
  .gray { background: var(--btn-gray); color: #000; }
  .zero { grid-column: span 2; text-align: left; padding-left: 35px; }

  @media (min-width: 768px) { button { height: 90px; font-size: 34px; } }
</style>
</head>
<body>

<div class="calculator">
  <div id="history" class="history"></div>
  <div id="totalBox" class="total-box">
    <div id="flash" class="copy-flash"></div>
    <span id="totalText">合計: 0</span>
  </div>
  <div class="keys" id="keypad">
    <button class="gray" data-val="DEL">⌫</button>
    <button class="gray" data-val="AC">AC</button>
    <button class="gray" data-val="%">%</button>
    <button class="op" data-val="/">÷</button>
    <button data-val="7">7</button><button data-val="8">8</button><button data-val="9">9</button>
    <button class="op" data-val="*">×</button>
    <button data-val="4">4</button><button data-val="5">5</button><button data-val="6">6</button>
    <button class="op" data-val="-">−</button>
    <button data-val="1">1</button><button data-val="2">2</button><button data-val="3">3</button>
    <button class="op" data-val="+">＋</button>
    <button class="zero" data-val="0">0</button>
    <button data-val=".">.</button>
    <button class="equal" data-val="=">=</button>
  </div>
</div>

<script>
/* --- localStorage --- */
function saveHistoryToLocal() {
  const lines = [];
  document.querySelectorAll('.history-item[data-type="history"]').forEach(item => {
    lines.push(item.querySelector(".text").textContent);
  });
  localStorage.setItem("calcHistory", JSON.stringify(lines));
}

function loadHistoryFromLocal() {
  const data = JSON.parse(localStorage.getItem("calcHistory") || "[]");
  data.forEach(text => ui.createHistoryElement(text, true));
  ui.updateTotal();
}

/* --- Logic --- */
const state = {
  formula: [], current: "", isCalculated: false,
  reset() { this.formula = []; this.current = ""; this.isCalculated = false; },
  execute() {
    let tokens = [...this.formula];
    if (this.current !== "" && this.current !== "-") tokens.push(this.current);
    if (tokens.length === 0) return 0;
    let res = parseFloat(tokens[0]);
    for (let i = 1; i < tokens.length; i += 2) {
      let op = tokens[i], nextVal = parseFloat(tokens[i+1]);
      if (isNaN(nextVal)) continue;
      if (op === '+') res += nextVal; if (op === '-') res -= nextVal;
      if (op === '*') res *= nextVal; if (op === '/') res = nextVal !== 0 ? res / nextVal : 0;
    }
    return parseFloat(res.toPrecision(12));
  }
};

/* --- UI --- */
const ui = {
  history: document.getElementById("history"),
  total: document.getElementById("totalText"),
  totalBox: document.getElementById("totalBox"),
  flash: document.getElementById("flash"),

  format: n => {
    if (n === "-" || n === "" || n === null || isNaN(n)) return n;
    const p = String(n).split(".");
    p[0] = Number(p[0]).toLocaleString("ja-JP");
    return p.join(".");
  },

  toSymbol: s => s.replace(/\*/g,"×").replace(/\//g,"÷"),

  updateTotal() {
    let sum = 0;
    this.history.querySelectorAll('.history-item[data-type="history"]').forEach(item => {
      const val = item.querySelector(".text").textContent.split("=").pop().replace(/,/g,"").trim();
      sum += parseFloat(val) || 0;
    });
    this.total.textContent = `合計: ${this.format(parseFloat(sum.toPrecision(12)))}`;
  },

  createHistoryElement(text, isFinal) {
    const item = document.createElement("div");
    item.className = "history-item";
    item.dataset.type = isFinal ? "history" : "input";
    item.innerHTML = `
      <div class="delete-label">削除</div>
      <div class="history-content"><span class="text">${text}</span></div>
    `;
    this.history.appendChild(item);
    if (isFinal) this.attachSwipe(item);
    return item;
  },

  renderInput() {
    let item = this.history.lastElementChild;
    if (!item || item.dataset.type !== "input") {
      item = this.createHistoryElement("", false);
    }
    let expr = state.formula.map(i => ["+","-","*","/"].includes(i) ? this.toSymbol(i) : this.format(i)).join("");
    expr += this.format(state.current);
    item.querySelector(".text").textContent = expr || "0";
    this.history.scrollTop = this.history.scrollHeight;
  },

  finalize(expr, res, omit) {
    const item = this.history.lastElementChild;
    if (!item) return;
    const finalStr = omit ? this.format(res) : `${expr}=${this.format(res)}`;
    item.dataset.type = "history";
    item.querySelector(".text").textContent = finalStr;
    this.attachSwipe(item);
    this.updateTotal();
  },

  attachSwipe(el) {
    const content = el.querySelector(".history-content");
    let startX = 0, currentX = 0, isOpen = false;
    el.addEventListener("touchstart", e => {
      startX = e.touches[0].pageX;
      content.style.transition = "none";
    }, {passive: true});
    el.addEventListener("touchmove", e => {
      let diff = e.touches[0].pageX - startX;
      if (isOpen) diff -= 80;
      if (diff > 0) diff = 0;
      if (diff < -100) diff = -100;
      currentX = diff;
      content.style.transform = `translateX(${currentX}px)`;
    }, {passive: true});
    el.addEventListener("touchend", () => {
      content.style.transition = "transform 0.25s ease-out";
      if (currentX < -40) { content.style.transform = "translateX(-80px)"; isOpen = true; } 
      else { content.style.transform = "translateX(0px)"; isOpen = false; }
    });
    el.querySelector(".delete-label").addEventListener("click", () => {
      el.remove(); ui.updateTotal(); saveHistoryToLocal();
    });
  },

  copyToClipboard() {
    const lines = [];
    document.querySelectorAll('.history-item[data-type="history"]').forEach(item => {
      lines.push(item.querySelector(".text").textContent);
    });
    if (lines.length === 0) return;
    const textToCopy = lines.join("\n") + "\n---\n" + this.total.textContent;
    navigator.clipboard.writeText(textToCopy).then(() => {
      this.flash.style.animation = "none";
      this.flash.offsetHeight;
      this.flash.style.animation = "flash-animation 0.4s ease-out";
    });
  }
};

/* --- Controller --- */
function handleInput(val) {
  if (state.isCalculated && !isNaN(val)) state.reset();
  state.isCalculated = false;

  if (val === "AC") {
    state.reset(); ui.history.innerHTML = ""; ui.updateTotal(); saveHistoryToLocal();
  } else if (val === "DEL") {
    if (state.current !== "") state.current = state.current.slice(0, -1);
    else if (state.formula.length > 0) { state.formula.pop(); state.current = state.formula.pop() || ""; }
  } else if (val === "=") {
    if (state.current === "" && state.formula.length === 0) return;
    const expr = state.formula.map(i => ["+","-","*","/"].includes(i) ? ui.toSymbol(i) : ui.format(i)).join("") + ui.format(state.current);
    const res = state.execute();
    ui.finalize(expr, res, (state.formula.length === 0));
    saveHistoryToLocal(); state.reset(); state.isCalculated = true;
  } else if (["+", "-", "*", "/"].includes(val)) {
    if (val === "-" && state.current === "" && state.formula.length === 0) state.current = "-";
    else if (state.current !== "" && state.current !== "-") { state.formula.push(state.current); state.formula.push(val); state.current = ""; }
    else if (state.formula.length > 0) state.formula[state.formula.length - 1] = val;
  } else {
    if (val === "." && state.current.includes(".")) return;
    state.current += val;
  }
  ui.renderInput();
}

document.getElementById("keypad").addEventListener("pointerdown", e => {
  const b = e.target.closest("button");
  if (!b) return; e.preventDefault(); handleInput(b.dataset.val);
});

ui.totalBox.addEventListener("click", () => ui.copyToClipboard());

loadHistoryFromLocal();
ui.renderInput();
</script>
</body>
</html>
